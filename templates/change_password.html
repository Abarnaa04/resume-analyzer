<!DOCTYPE html>
<html>
<head>
<title>Change Password</title>

<style>
body{
    background:#08122e;
    color:white;
    font-family:Poppins;
}

.box{
    width:400px;
    margin:auto;
    margin-top:100px;
    background:#16213e;
    padding:30px;
    border-radius:20px;
}

input{
    width:100%;
    padding:10px;
    margin:10px 0;
}

button{
    width:100%;
    padding:10px;
}
</style>

</head>
<body>

<div class="box">

<h2>🔑 Change Password</h2>

<form method="POST">

<input
type="password"
name="old_password"
placeholder="Old Password"
required>

<input
type="password"
name="new_password"
placeholder="New Password"
required>

<button type="submit">
Update Password
</button>

</form>

</div>

</body>
</html>
