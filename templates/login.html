<!DOCTYPE html>
<html>
<head>
    <title>Login</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

    <style>
        body{
            margin:0;
            font-family:Poppins;
            background: linear-gradient(135deg,#0f0c29,#302b63,#24243e);
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
            color:white;
        }

        .box{
            width:360px;
            padding:30px;
            background:rgba(255,255,255,0.08);
            border-radius:15px;
            backdrop-filter: blur(12px);
            box-shadow:0 0 20px rgba(0,229,255,0.15);
            text-align:center;
        }

        h2{
            margin-bottom:20px;
            color:#00e5ff;
        }

        input{
            width:100%;
            padding:10px;
            margin:8px 0;
            border:none;
            border-radius:10px;
            outline:none;
            font-size:14px;
        }

        button{
            width:100%;
            padding:10px;   /* 🔥 SMALL BUTTON SIZE FIX */
            margin-top:10px;
            border:none;
            border-radius:10px;
            background:linear-gradient(90deg,#00c6ff,#0072ff);
            color:white;
            font-weight:bold;
            cursor:pointer;
            transition:0.3s;
        }

        button:hover{
            transform:scale(1.03);
            box-shadow:0 0 12px #00c6ff;
        }

        a{
            display:block;
            margin-top:12px;
            color:#00e5ff;
            text-decoration:none;
            font-size:14px;
        }

        .msg{
            color:#ff4d4d;
            font-size:13px;
            margin-top:8px;
        }
    </style>
</head>

<body>

<div class="box">

    <h2>🔐 Login</h2>

    <form method="POST">
        <input name="username" placeholder="Username" required>
        <input name="password" type="password" placeholder="Password" required>

        <button>Login</button>
    </form>

    {% if message %}
        <div class="msg">{{message}}</div>
    {% endif %}

    <a href="/signup">🆕 Create New Account</a>

</div>

</body>
</html>
