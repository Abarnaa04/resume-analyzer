<!DOCTYPE html>
<html>
<head>
    <title>Result</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">

    <style>
        body{
            margin:0;
            font-family:Poppins;
            background: linear-gradient(135deg,#0f0c29,#302b63,#24243e);
            color:white;
            display:flex;
            justify-content:center;
            align-items:center;
            min-height:100vh;
        }

        .container{
            width:100%;
            max-width:700px;
            padding:25px;
            background:rgba(255,255,255,0.08);
            border-radius:15px;
            backdrop-filter: blur(12px);
            box-shadow:0 0 25px rgba(0,229,255,0.15);
        }

        h2{
            text-align:center;
            color:#00e5ff;
        }

        pre{
            white-space:pre-wrap;
            background:rgba(0,0,0,0.25);
            padding:15px;
            border-radius:10px;
            border-left:4px solid #00e5ff;
        }

        /* CHAT BOX */
        .chat-box{
            margin-top:20px;
            padding:15px;
            background:rgba(255,255,255,0.06);
            border-radius:12px;
        }

        .chat-box h3{
            margin-bottom:10px;
            color:#00e5ff;
        }

        .chat-input{
            display:flex;
            gap:10px;
        }

        input{
            flex:1;
            padding:10px;
            border:none;
            border-radius:10px;
            outline:none;
        }

        button{
            padding:10px 15px;
            border:none;
            border-radius:10px;
            background:linear-gradient(90deg,#00c6ff,#0072ff);
            color:white;
            font-weight:bold;
            cursor:pointer;
        }

        button:hover{
            transform:scale(1.05);
        }

        #chat{
            margin-top:15px;
            max-height:200px;
            overflow:auto;
        }

        .msg{
            margin:5px 0;
        }

        .user{
            color:#00e5ff;
        }

        .ai{
            color:#ffffff;
        }
    </style>
</head>

<body>

<div class="container">

    <h2>🧠 AI Resume Analysis</h2>

    <pre>{{result}}</pre>

    <a href="/dashboard" style="color:#00e5ff;">⬅ Back</a>

    <!-- CHAT -->
    <div class="chat-box">

        <h3>💬 Career Chat Assistant</h3>

        <div class="chat-input">
            <input id="msg" placeholder="Ask career doubts...">
            <button onclick="send()">Send</button>
        </div>

        <div id="chat"></div>
    </div>

</div>

<script>
function send(){
    let msg = document.getElementById("msg").value;

    if(!msg) return;

    fetch("/chat", {
        method:"POST",
        headers: {"Content-Type":"application/x-www-form-urlencoded"},
        body:"message=" + encodeURIComponent(msg)
    })
    .then(res => res.json())
    .then(data => {
        document.getElementById("chat").innerHTML += `
            <div class="msg user">👤 You: ${msg}</div>
            <div class="msg ai">🤖 AI: ${data.reply}</div>
        `;
    });

    document.getElementById("msg").value = "";
}
</script>

</body>
</html>
